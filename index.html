<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de EPP · RAM Equipos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --steel:#1B2027;
    --steel-2:#2B323C;
    --bg:#F1F2F4;
    --card:#FFFFFF;
    --yellow:#FFC72C;
    --yellow-dark:#E8A800;
    --orange:#E8590C;
    --green:#2F9E44;
    --red:#D6336C;
    --text:#1B2027;
    --text-soft:#5C6470;
    --line:#DCDFE3;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:720px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:100px;}

  /* ===== RESPONSIVE: TABLET / DESKTOP ===== */
  @media (min-width:860px){
    body{ padding:28px 16px; }
    .app{
      max-width:960px; min-height:auto; border-radius:22px; overflow:hidden;
      box-shadow:0 20px 60px rgba(27,32,39,.12); border:1px solid var(--line);
    }
    .footer-nav{ max-width:960px; left:0; right:0; margin:0 auto; border-radius:0 0 22px 22px; }
    .home-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
    .home-card{ flex-direction:column; align-items:flex-start; text-align:left; }
    .home-card-arrow{ align-self:flex-end; margin-top:auto; }
    #histResults, #colabResults{
      display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; align-items:start;
    }
    #histResults .rec-card, #colabResults .rec-card{ margin-bottom:0; }
    #histResults .empty-state, #colabResults .empty-state{ grid-column:1/-1; }
    .card, .cat, .divider, .success{ max-width:640px; margin-left:auto; margin-right:auto; }
    .cat{ margin-bottom:10px; }
  }

  /* ===== HEADER / LETTERHEAD ===== */
  .letterhead{
    background:var(--steel);
    color:#fff;
    padding:16px 18px 14px;
    position:relative;
    overflow:hidden;
  }
  .letterhead::after{
    content:"";
    position:absolute; right:-40px; top:-40px; width:140px; height:140px;
    background:repeating-linear-gradient(45deg, var(--yellow) 0 10px, transparent 10px 20px);
    opacity:.12; border-radius:50%;
  }
  .lh-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .lh-badge{
    font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--yellow);
    background:rgba(255,199,44,.1); border:1px solid rgba(255,199,44,.35);
    padding:3px 8px; border-radius:6px; white-space:nowrap;
  }
  .lh-title{
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:20px;
    letter-spacing:.5px; text-transform:uppercase; margin:8px 0 2px;
  }
  .lh-sub{font-size:11.5px; color:#B8BEC7; line-height:1.5;}
  .lh-sub b{color:#fff; font-weight:600;}

  /* nav tabs */
  .tabs{display:flex; background:var(--steel-2);}
  .tab{
    flex:1; text-align:center; padding:11px 6px; font-size:13px; font-weight:600;
    color:#9AA1AC; cursor:pointer; border-bottom:3px solid transparent; transition:.15s;
  }
  .tab.active{color:#fff; border-bottom-color:var(--yellow); background:rgba(255,255,255,.03);}

  /* ===== PROGRESS ===== */
  .progress-wrap{padding:16px 18px 4px;}
  .progress-steps{display:flex; gap:6px; margin-bottom:8px;}
  .pstep{flex:1; height:5px; border-radius:3px; background:var(--line); transition:.25s;}
  .pstep.done{background:var(--yellow-dark);}
  .pstep.current{background:var(--yellow);}
  .progress-label{font-size:12px; color:var(--text-soft); font-weight:600; display:flex; justify-content:space-between;}
  .progress-label span.n{color:var(--steel); font-family:'Barlow Condensed',sans-serif; font-weight:700;}

  .view{padding:6px 18px 12px;}
  .card{
    background:var(--card); border-radius:var(--radius); padding:18px;
    border:1px solid var(--line); margin-bottom:14px;
  }
  h2.step-title{
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px;
    margin:2px 0 4px; letter-spacing:.2px;
  }
  p.step-desc{font-size:13px; color:var(--text-soft); margin:0 0 16px; line-height:1.5;}

  .field{margin-bottom:14px;}
  .field label{
    display:block; font-size:12.5px; font-weight:600; color:var(--text-soft);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px;
  }
  .field label .req{color:var(--orange);}
  .field input[type=text], .field input[type=number], .field select, .field input[type=date]{
    width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:10px;
    font-size:16px; font-family:'Inter',sans-serif; background:#FAFAFB; color:var(--text);
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--yellow-dark); background:#fff;}
  .hint-banner{
    display:flex; gap:8px; align-items:flex-start; background:#EAF7EE; border-left:3px solid var(--green);
    color:#237339; font-size:12.5px; padding:9px 11px; border-radius:9px; margin:-4px 0 14px;
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media (max-width:420px){.grid2{grid-template-columns:1fr;}}

  /* ===== CATEGORY ACCORDIONS ===== */
  .cat{border:1.5px solid var(--line); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; background:#fff;}
  .cat-head{
    display:flex; align-items:center; gap:12px; padding:14px 14px; cursor:pointer; user-select:none;
  }
  .cat-icon{
    width:38px; height:38px; border-radius:10px; background:var(--bg); display:flex;
    align-items:center; justify-content:center; flex-shrink:0; color:var(--steel);
  }
  .cat-icon svg{width:20px; height:20px;}
  .cat-title{flex:1; font-weight:700; font-size:14.5px;}
  .cat-count{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600; color:var(--text-soft);
    background:var(--bg); padding:3px 8px; border-radius:20px; min-width:20px; text-align:center;
  }
  .cat-count.has{background:var(--yellow); color:var(--steel);}
  .chev{transition:.2s; color:var(--text-soft);}
  .chev svg{width:18px; height:18px; display:block;}
  .cat.open .chev{transform:rotate(180deg);}
  .cat-body{display:none; padding:2px 14px 14px;}
  .cat.open .cat-body{display:block;}
  .item-row{
    display:flex; flex-wrap:wrap; align-items:center; gap:11px; padding:11px 4px; border-top:1px solid #F0F1F2;
  }
  .item-row:first-child{border-top:none;}
  .item-row-main{display:flex; align-items:center; gap:11px; flex:1 0 100%;}
  .checkbox{
    width:22px; height:22px; border-radius:6px; border:2px solid var(--line); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.12s;
  }
  .checkbox.checked{background:var(--steel); border-color:var(--steel);}
  .checkbox svg{width:13px; height:13px; opacity:0; transition:.12s;}
  .checkbox.checked svg{opacity:1;}
  .item-label{flex:1; font-size:14px; cursor:pointer;}
  .talla-select{display:flex; gap:6px; flex-wrap:wrap; flex:1 0 100%; margin:2px 0 2px 33px;}
  .talla-btn{
    font-size:11.5px; font-weight:700; font-family:'IBM Plex Mono',monospace; padding:6px 10px;
    border:1.5px solid var(--line); border-radius:7px; background:#fff; cursor:pointer; color:var(--text-soft);
    position:relative;
  }
  .talla-btn.sel{background:var(--yellow); border-color:var(--yellow-dark); color:var(--steel);}
  .talla-btn.common::after{
    content:""; position:absolute; top:-3px; right:-3px; width:6px; height:6px; border-radius:50%;
    background:var(--orange);
  }
  .talla-btn.sel.common::after{display:none;}
  .talla-input{
    width:76px; padding:6px 8px; border:1.5px solid var(--line); border-radius:7px; font-size:16px;
    flex:1 0 100%; margin-left:33px; max-width:120px;
  }

  textarea{
    width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:10px;
    font-size:16px; font-family:'Inter',sans-serif; background:#FAFAFB; resize:vertical; min-height:60px;
  }

  /* radio pills */
  .pillgroup{display:flex; gap:8px; flex-wrap:wrap;}
  .pill{
    flex:1; text-align:center; padding:13px 10px; border:1.5px solid var(--line); border-radius:10px;
    font-size:13px; font-weight:600; cursor:pointer; color:var(--text-soft); background:#FAFAFB; min-width:100px;
  }
  .pill.sel{background:var(--steel); color:#fff; border-color:var(--steel);}

  /* signature */
  .sig-box{border:1.5px dashed var(--line); border-radius:12px; background:#FAFAFB; position:relative;}
  canvas{width:100%; height:150px; display:block; border-radius:12px; touch-action:none;}
  .sig-clear{
    position:absolute; top:8px; right:8px; background:#fff; border:1px solid var(--line);
    border-radius:7px; font-size:11px; font-weight:600; padding:5px 9px; cursor:pointer; color:var(--text-soft);
  }
  .sig-placeholder{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:12.5px; color:#B4B9C0; pointer-events:none;
  }

  .declaration{
    font-size:12px; color:var(--text-soft); line-height:1.55; background:var(--bg);
    border-radius:10px; padding:12px 13px; margin-bottom:14px;
  }

  /* footer nav */
  .footer-nav{
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    display:flex; gap:10px; max-width:720px; margin:0 auto;
  }
  .btn{
    flex:1; padding:14px; border-radius:11px; font-size:15px; font-weight:700; cursor:pointer;
    border:none; font-family:'Inter',sans-serif; transition:.12s;
  }
  .btn-primary{background:var(--steel); color:#fff;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{background:#C7CBD1; cursor:not-allowed;}
  .btn-ghost{background:#fff; color:var(--steel); border:1.5px solid var(--line); flex:0 0 auto; padding:14px 18px;}

  .summary-row{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid #F0F1F2; font-size:13.5px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-row .k{color:var(--text-soft);}
  .summary-row .v{font-weight:600; text-align:right;}
  .summary-cat{font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; margin:14px 0 4px; color:var(--steel);}
  .chip{
    display:inline-block; background:var(--bg); font-size:12px; padding:5px 10px; border-radius:20px;
    margin:3px 4px 0 0; color:var(--text);
  }

  /* success screen */
  .success{text-align:center; padding:40px 20px;}
  .success-icon{
    width:74px; height:74px; border-radius:50%; background:#EAF7EE; color:var(--green);
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px;
  }
  .success-icon svg{width:34px; height:34px;}
  .success h2{font-family:'Barlow Condensed',sans-serif; font-size:24px; margin:0 0 6px;}
  .success p{color:var(--text-soft); font-size:14px; margin:0 0 22px;}
  .sync-badge{
    display:inline-block; font-size:12px; font-weight:600; padding:8px 14px; border-radius:20px;
    margin:-8px 0 20px;
  }
  .sync-badge.syncing{background:var(--bg); color:var(--text-soft);}
  .sync-badge.ok{background:#EAF7EE; color:var(--green);}
  .sync-badge.error{background:#FFF4E5; color:#8A5300; white-space:normal; max-width:340px; text-align:left; border-radius:12px;}

  /* ===== HISTORIAL ===== */
  .search-bar{
    display:flex; gap:8px; margin-bottom:12px;
  }
  .search-bar input{
    flex:1; padding:11px 13px; border:1.5px solid var(--line); border-radius:10px; font-size:16px; background:#fff;
  }
  .icon-btn{
    width:44px; height:44px; border-radius:10px; border:1.5px solid var(--line); background:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--steel); flex-shrink:0;
    font:inherit; padding:0;
  }
  .icon-btn svg{width:20px; height:20px;}
  .rec-card{
    background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:10px;
  }
  .rec-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .rec-name{font-weight:700; font-size:14.5px;}
  .rec-meta{font-size:12px; color:var(--text-soft); margin-top:2px;}
  .rec-date{
    font-family:'IBM Plex Mono',monospace; font-size:11px; background:var(--bg); padding:4px 8px;
    border-radius:7px; white-space:nowrap; color:var(--steel); font-weight:600;
  }
  .rec-tags{margin-top:8px;}
  .rec-actions{display:flex; gap:8px; margin-top:10px;}
  .rec-actions button{
    font-size:12px; font-weight:600; padding:7px 11px; border-radius:8px; border:1.5px solid var(--line);
    background:#fff; color:var(--text-soft); cursor:pointer;
  }
  .rec-actions button.danger{color:var(--red); border-color:#F4C6D6;}
  .empty-state{text-align:center; padding:50px 20px; color:var(--text-soft);}
  .empty-state svg{width:44px; height:44px; margin-bottom:12px; color:var(--line);}
  .loading{text-align:center; padding:40px; color:var(--text-soft); font-size:13px;}
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--steel); color:#fff;
    padding:11px 18px; border-radius:30px; font-size:13px; font-weight:600; z-index:50; opacity:0; transition:.25s;
    box-shadow:0 8px 20px rgba(0,0,0,.2); white-space:nowrap;
  }
  .toast.show{opacity:1; bottom:100px;}
  .sig-thumb{border:1px solid var(--line); border-radius:8px; background:#fff; max-width:180px; display:block; margin-top:4px;}

  /* worker picker */
  .worker-pick-list{display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto;}
  .worker-pick{
    display:flex; align-items:center; gap:11px; padding:11px; border:1.5px solid var(--line);
    border-radius:11px; cursor:pointer; background:#FAFAFB; transition:.12s;
  }
  .worker-pick:active{background:#EFEFF1;}
  .worker-pick-avatar{
    width:36px; height:36px; border-radius:50%; background:var(--yellow); color:var(--steel);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;
    font-family:'Barlow Condensed',sans-serif; flex-shrink:0;
  }
  .worker-pick-info{flex:1; min-width:0;}
  .worker-pick-name{font-weight:700; font-size:13.5px;}
  .worker-pick-meta{font-size:11.5px; color:var(--text-soft); margin-top:1px;}
  .worker-pick-arrow{color:var(--text-soft); flex-shrink:0;}
  .divider{
    display:flex; align-items:center; text-align:center; color:var(--text-soft); font-size:12px;
    font-weight:600; margin:6px 4px 14px;
  }
  .divider::before, .divider::after{content:""; flex:1; height:1px; background:var(--line);}
  .divider span{padding:0 10px;}
  .storage-warn{
    display:flex; gap:8px; align-items:flex-start; background:#FFF4E5; border-left:3px solid var(--orange);
    color:#8A5300; font-size:12.5px; padding:10px 12px; border-radius:10px; margin:0 18px 12px;
  }

  /* ===== DASHBOARD ===== */
  .kpi-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; }
  .kpi-card{ background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:14px; }
  .kpi-value{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:24px; color:var(--steel); line-height:1.1; }
  .kpi-label{ font-size:11px; color:var(--text-soft); text-transform:uppercase; letter-spacing:.3px; margin-top:3px; }

  .hbar-row{ margin-bottom:14px; }
  .hbar-row:last-child{ margin-bottom:0; }
  .hbar-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:5px; }
  .hbar-label{ font-size:12.5px; color:var(--text); font-weight:600; line-height:1.35; }
  .hbar-track{ height:13px; background:var(--bg); border-radius:8px; overflow:hidden; width:100%; }
  .hbar-fill{ height:100%; border-radius:8px; transition:width .3s; }
  .hbar-value{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; color:var(--text-soft); flex-shrink:0; white-space:nowrap; }

  .vbar-chart{ display:flex; align-items:flex-end; gap:6px; height:130px; padding-top:20px; overflow-x:auto; }
  .vbar-col{ flex:1 0 40px; min-width:40px; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
  .vbar-bar{ width:100%; max-width:26px; border-radius:5px 5px 0 0; background:var(--steel); min-height:3px; }
  .vbar-label{ font-size:9.5px; color:var(--text-soft); white-space:normal; text-align:center; line-height:1.2; }
  .vbar-value{ font-size:10.5px; font-weight:700; color:var(--steel); font-family:'IBM Plex Mono',monospace; }

  .donut-wrap{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .donut-svg{ width:140px; height:140px; flex-shrink:0; }
  .donut-legend{ flex:1; min-width:140px; }
  .legend-row{ display:flex; align-items:center; gap:8px; font-size:12.5px; margin-bottom:7px; }
  .legend-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .legend-label{ flex:1; }
  .legend-value{ font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--text-soft); font-size:11.5px; }

  .dash-table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:420px; }
  .dash-table th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; color:var(--text-soft); padding:7px 8px; border-bottom:2px solid var(--line); white-space:nowrap; }
  .dash-table td{ padding:8px 8px; border-bottom:1px solid #F0F1F2; }
  .dash-table tbody tr:hover{ background:var(--bg); }

  @media (min-width:860px){
    .kpi-grid{ grid-template-columns:repeat(4,1fr); }
    .dash-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
    .card.full-width{ max-width:none; margin-left:0; margin-right:0; }
  }

  /* ===== COLABORADORES MODULE ===== */
  .colab-toolbar{display:flex; gap:8px; margin-bottom:10px;}
  .filter-pills{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;}
  .filter-pill{
    font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px; border:1.5px solid var(--line);
    background:#fff; color:var(--text-soft); cursor:pointer;
  }
  .filter-pill.sel{background:var(--steel); color:#fff; border-color:var(--steel);}
  .status-badge{
    font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:20px; text-transform:uppercase;
    letter-spacing:.3px; white-space:nowrap;
  }
  .status-badge.activo{background:#EAF7EE; color:var(--green);}
  .status-badge.inactivo{background:#F1F2F4; color:var(--text-soft);}
  .fab-add{
    width:44px; height:44px; border-radius:10px; background:var(--steel); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font:inherit; padding:0;
  }
  .fab-add svg{width:20px; height:20px;}
  .combo-box{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:10px;
    font-size:15px; font-family:'Inter',sans-serif; background:#FAFAFB; cursor:pointer; user-select:none;
  }
  .combo-box.open{ border-color:var(--yellow-dark); background:#fff; border-radius:10px 10px 0 0; }
  .combo-box .combo-placeholder{ color:#9AA1AC; }
  .combo-box .chev{ flex-shrink:0; transition:.15s; }
  .combo-box.open .chev{ transform:rotate(180deg); }
  .combo-list{
    border:1.5px solid var(--yellow-dark); border-top:none; border-radius:0 0 10px 10px;
    max-height:280px; overflow-y:auto; background:#fff;
  }
  .combo-option{
    padding:12px 13px; font-size:14px; cursor:pointer; border-top:1px solid #F0F1F2;
  }
  .combo-option:first-child{ border-top:none; }
  .combo-option:active{ background:var(--bg); }
  .combo-option.sel{ background:#FFF8E6; font-weight:600; }

  /* ===== HOME MENU ===== */
  .home-lead{font-size:13px; color:var(--text-soft); margin:4px 4px 14px;}
  .home-card{
    display:flex; align-items:center; gap:14px; background:#fff; border:1.5px solid var(--line);
    border-radius:16px; padding:18px; margin-bottom:12px; cursor:pointer; transition:.12s;
  }
  .home-card:active{background:#FAFAFB;}
  .home-card-icon{

  catch(e){ console.warn('No se pudo recordar la URL en este navegador', e); }
}

/* ============ DATA LAYER — la Hoja de Google es la única fuente de datos ============ */
async function loadWorkersMap(){
  if(!sheetUrl){ workersMap = {}; return; }
  try{
    const sep = sheetUrl.includes('?') ? '&' : '?';
    const json = await sheetFetch(sheetUrl + sep + 'type=colaboradores');
    const map = {};
    (json.rows||[]).forEach(row=>{
      const dni = String(row['DNI']||'').trim();
      if(!dni) return;
      map[dni] = {
        nombre: row['Nombre']||'',
        cargo: row['Cargo']||'',
        sede: row['Sede']||'',
        nivel: row['Nivel']||'',
        estado: String(row['Estado']||'Activo').toLowerCase()==='activo' ? 'activo' : 'inactivo'
      };
    });
    workersMap = map;
  }catch(e){
    console.error('No se pudo cargar colaboradores desde la hoja', e);
  }
}

async function fetchAllRecords(){
  if(!sheetUrl) return [];
  try{
    const sep = sheetUrl.includes('?') ? '&' : '?';
    const json = await sheetFetch(sheetUrl + sep + 'type=registros');
    const rows = json.rows || [];
    const byId = {};
    const order = [];
    rows.forEach(row=>{
      const id = String(row['ID']||'');
      if(!id) return;
      if(!byId[id]){
        byId[id] = {
          id,
          fecha: row['Fecha']||'',
          worker: { nombre: row['Trabajador']||'', dni: String(row['DNI']||''), cargo: row['Cargo']||'', sede: row['Sede']||'' },
          tipo_entrega: row['Tipo de entrega']||'',
          otros: '',
          _itemRows: []
        };
        order.push(id);
      }
      byId[id]._itemRows.push({ categoria: row['Categoría']||'', item: row['EPPs']||'', talla: row['Talla']||'' });
    });
    return order.map(id => byId[id]).reverse();
  }catch(e){
    console.error('No se pudo cargar registros desde la hoja', e);
    return [];
  }
}

async function saveRecord(record){
  const res = await syncRegistroToSheet(record);
  if(!res.ok){ throw new Error(res.message || 'No se pudo guardar en la Hoja de Google'); }
  record._itemRows = buildItemRows(record);
  if(historialCache) historialCache.unshift(record);
  const prevEstado = workersMap[record.worker.dni] ? workersMap[record.worker.dni].estado : 'activo';
  if(!workersMap[record.worker.dni]){
    workersMap[record.worker.dni] = { nombre:record.worker.nombre, cargo:record.worker.cargo, sede:record.worker.sede, nivel:'', estado: prevEstado };
  }
  return true;
}

async function deleteRecord(id){
  await deleteRegistroFromSheet(id);
  if(historialCache) historialCache = historialCache.filter(r=>r.id!==id);
}

async function saveColaborador(data, origDni){
  const res = await syncColaboradorToSheet(data);
  if(!res.ok){ throw new Error(res.message || 'No se pudo guardar en la Hoja de Google'); }
  if(origDni && origDni !== data.dni){ delete workersMap[origDni]; deleteColaboradorFromSheet(origDni); }
  workersMap[data.dni] = { nombre:data.nombre, cargo:data.cargo, sede:data.sede, nivel:data.nivel||'', estado:data.estado };
}

async function deleteColaborador(dni){
  await deleteColaboradorFromSheet(dni);
  delete workersMap[dni];
}

async function toggleEstadoColaborador(dni){
  if(!workersMap[dni]) return;
  const prevEstado = workersMap[dni].estado;
  workersMap[dni].estado = prevEstado === 'activo' ? 'inactivo' : 'activo';
  const res = await syncColaboradorToSheet({dni, ...workersMap[dni]});
  if(!res.ok){
    workersMap[dni].estado = prevEstado;
    throw new Error(res.message || 'No se pudo actualizar en la hoja');
  }
}

function fmtDate(raw){
  if(!raw) return '—';
  const s = String(raw);
  // Fecha simple "AAAA-MM-DD" (recién creada, aún no pasó por la hoja)
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
    const d = new Date(s + 'T00:00:00');
    if(isNaN(d.getTime())) return '—';
    return d.toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' });
  }
  // Fecha/hora completa devuelta por Google Sheets: formatear en UTC para no correr de día
  const d = new Date(s);
  if(isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric', timeZone:'UTC' });
}

function missingTallaItems(){
  const missing = [];
  CATEGORIES.forEach(cat=>{
    cat.items.forEach(it=>{

      if(st && st.checked && it.talla && (!st.talla || !String(st.talla).trim())){
        missing.push(it.label);
      }
    });
  });
  return missing;
}

function canAdvance(){
  if(state.step===1){
    return !!state.worker.dni;
  }
  if(state.step===2){
    if(totalSelected() === 0 && state.otros.trim().length === 0) return false;
    return missingTallaItems().length === 0;
  }
  if(state.step===3){
    return !!state.tipo_entrega && !!state.fecha && !!state.signatureData;
  }
  return true;
}

function buildItemRows(record){

function getItemRows(r){

function flattenRecordItems(r){

function getAllItemRowsFlat(){
  const out = [];
  (historialCache||[]).forEach(r=>{
    getItemRows(r).forEach(x=>{
      out.push({
        categoria: x.categoria || '—', item: x.item || '—', talla: x.talla || '',

    });

}

function dashFilteredRows(){
  const f = state.dashFilters;
  let rows = getAllItemRowsFlat();
  if(f.sede) rows = rows.filter(r=>r.sede===f.sede);
  if(f.categoria) rows = rows.filter(r=>r.categoria===f.categoria);
  if(f.desde) rows = rows.filter(r=> r.fecha && r.fecha.slice(0,10) >= f.desde);
  if(f.hasta) rows = rows.filter(r=> r.fecha && r.fecha.slice(0,10) <= f.hasta);
  return rows;
}

function countBy(rows, key){
  const counts = {};
  rows.forEach(r=>{ const k = r[key] || '—'; counts[k] = (counts[k]||0) + 1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
}

function monthlyTrend(rows){
  const counts = {};
  rows.forEach(r=>{ const m = (r.fecha||'').slice(0,7); if(!m) return; counts[m] = (counts[m]||0) + 1; });
  return Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]));
}

function monthLabel(ym){
  if(!ym) return '—';
  const [y,m] = ym.split('-');
  const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const idx = parseInt(m,10) - 1;
  return (names[idx]||'—') + ' ' + y;
}

function getWeekStart(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr.slice(0,10) + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const day = d.getDay(); // 0=domingo .. 6=sábado
  const diff = (day === 0 ? -6 : 1 - day); // retrocede hasta el lunes
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0,10);
}

function weeklyTrend(rows, lastN){
  const counts = {};
  rows.forEach(r=>{
    const ws = getWeekStart(r.fecha);
    if(!ws) return;
    counts[ws] = (counts[ws]||0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]));
  return lastN ? sorted.slice(-lastN) : sorted;
}

function weekLabel(ws){
  if(!ws) return '—';
  const d = new Date(ws + 'T00:00:00');
  if(isNaN(d.getTime())) return '—';
  const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return d.getDate() + ' ' + names[d.getMonth()];
}

function topColaboradores(rows, n){
  const counts = {}, names = {};
  rows.forEach(r=>{
    const key = r.dni || '—';
    counts[key] = (counts[key]||0) + 1;
    names[key] = r.nombre || key;
  });
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0, n)
    .map(([dni,count])=>[names[dni] || dni, count]);
}

function topColaboradoresPorCategoria(rows, n){
  const byDni = {};
  rows.forEach(r=>{
    const key = r.dni || '—';
    if(!byDni[key]) byDni[key] = { nombre: r.nombre || key, total:0, cats:{} };
    byDni[key].total++;
    byDni[key].cats[r.categoria] = (byDni[key].cats[r.categoria]||0) + 1;
  });
  return Object.values(byDni).sort((a,b)=>b.total-a.total).slice(0,n);
}

function topColaboradoresItemDetail(rows, nColabs){
  const top = topColaboradoresPorCategoria(rows, nColabs);
  const topNames = new Set(top.map(d=>d.nombre));
  const filtered = rows.filter(r=> topNames.has(r.nombre));
  const byKey = {};
  filtered.forEach(r=>{
    const key = r.nombre + '|' + r.item + '|' + (r.talla||'');
    if(!byKey[key]) byKey[key] = { nombre:r.nombre, item:r.item, talla:r.talla||'', count:0 };
    byKey[key].count++;
  });
  return Object.values(byKey).sort((a,b)=> a.nombre.localeCompare(b.nombre,'es') || b.count-a.count);
}

function topColaboradoresItemChart(rows, nColabs){
  const detail = topColaboradoresItemDetail(rows, nColabs);
  const byItem = {};
  detail.forEach(d=>{ byItem[d.item] = (byItem[d.item]||0) + d.count; });
  return Object.entries(byItem).sort((a,b)=>b[1]-a[1]).slice(0,10);
}

function renderStackedColabBars(data){
  if(data.length===0) return `<p style="font-size:13px; color:var(--text-soft); margin:0;">Sin datos.</p>`;
  const max = Math.max(...data.map(d=>d.total));
  const catsUsed = new Set();
  const rowsHtml = data.map(d=>{
    const widthPct = Math.max((d.total/max*100), 4);
    const segs = Object.entries(d.cats).sort((a,b)=>b[1]-a[1]).map(([cat,count])=>{
      catsUsed.add(cat);
      const pct = (count/d.total*100);
      return `<div style="width:${pct}%; background:${getCategoryColor(cat)};" title="${cat}: ${count}"></div>`;
    }).join('');
    return `
    <div class="hbar-row">
      <div class="hbar-top"><span class="hbar-label">${d.nombre}</span><span class="hbar-value">${d.total}</span></div>
      <div class="hbar-track"><div style="width:${widthPct}%; height:100%; display:flex;">${segs}</div></div>
    </div>`;
  }).join('');
  const legend = Array.from(catsUsed).map(cat=>`
    <span class="chip" style="display:inline-flex; align-items:center; gap:5px;"><span style="width:8px; height:8px; border-radius:50%; background:${getCategoryColor(cat)}; display:inline-block;"></span>${cat}</span>`).join('');
  return `<div>${rowsHtml}</div><div style="margin-top:12px;">${legend}</div>`;
}

function shortName(fullName){
  const parts = (fullName||'').trim().split(/\s+/).filter(Boolean);
  if(parts.length <= 2) return parts.join(' ');
  // Convención DNI: [apellido1] [apellido2] [nombre1] [nombre2...] -> primer apellido + primer nombre
  return parts[0] + ' ' + parts[2];
}

function dayOfWeekLabel(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr.slice(0,10) + 'T00:00:00');
  if(isNaN(d.getTime())) return '—';
  const names = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return names[d.getDay()];
}

function daysBetween(d1, d2){
  const a = new Date(d1.slice(0,10) + 'T00:00:00');
  const b = new Date(d2.slice(0,10) + 'T00:00:00');
  if(isNaN(a.getTime()) || isNaN(b.getTime())) return null;
  return Math.round((b - a) / (1000*60*60*24));
}

function colaboradorItemIntervals(rows){
  const byKey = {};
  rows.forEach(r=>{
    if(!r.fecha || !r.item) return;
    const key = r.dni + '|' + r.item;
    if(!byKey[key]) byKey[key] = { dni: r.dni, nombre: r.nombre, item: r.item, fechas: new Set() };
    byKey[key].fechas.add(r.fecha);
  });

  // Solo combinaciones colaborador+EPP con 2 o más entregas (para poder comparar fechas)
  const groups = Object.values(byKey)
    .map(c => ({ ...c, fechas: Array.from(c.fechas).sort((a,b)=>a.localeCompare(b)) }))
    .filter(c => c.fechas.length >= 2);

  // De todos los EPP repetidos de cada colaborador, nos quedamos con el que más veces se le entregó
  const bestPerColab = {};
  groups.forEach(g=>{
    const cur = bestPerColab[g.dni];
    if(!cur || g.fechas.length > cur.fechas.length){ bestPerColab[g.dni] = g; }
  });

  const result = [];
  Object.values(bestPerColab).forEach(c=>{
    let prev = null;
    c.fechas.forEach((fecha, idx)=>{
      result.push({
        nombre: c.nombre, item: c.item, entregaNum: idx+1, totalEntregas: c.fechas.length,
        fecha, dia: dayOfWeekLabel(fecha), semana: getWeekStart(fecha),
        diasDesdeAnterior: prev ? daysBetween(prev, fecha) : null
      });
      prev = fecha;
    });
  });
  return result.sort((a,b)=> b.totalEntregas - a.totalEntregas || a.nombre.localeCompare(b.nombre,'es') || a.fecha.localeCompare(b.fecha));
}

function renderIntervalTable(data){

  const rowsHtml = data.map(d=>{

      <td style="text-align:center; white-space:nowrap;">${d.dia}</td>
      <td style="text-align:center; white-space:nowrap;">${weekLabel(d.semana)}</td>

        <th style="text-align:center;">Día</th><th style="text-align:center;">Semana</th><th style="text-align:center;">Días desde anterior</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>
  <p style="font-size:11px; color:var(--text-soft); margin:10px 0 0;"><span style="color:var(--orange); font-weight:700;">●</span> Menos de 30 días desde la entrega anterior — posible renovación muy frecuente. Ordenado por quién más veces repite el mismo EPP.</p>`;
}

function topColaboradoresMatrix(rows, nColabs, nItems){
  const top = topColaboradoresPorCategoria(rows, nColabs);
  const colaboradores = top.map(d=>d.nombre);
  const colabSet = new Set(colaboradores);
  const filtered = rows.filter(r=> colabSet.has(r.nombre));

  const itemTotals = {};
  filtered.forEach(r=>{ itemTotals[r.item] = (itemTotals[r.item]||0) + 1; });
  const items = Object.entries(itemTotals).sort((a,b)=>b[1]-a[1]).slice(0,nItems).map(e=>e[0]);
  const itemSet = new Set(items);

  const matrix = {};
  filtered.forEach(r=>{
    if(!itemSet.has(r.item)) return;
    if(!matrix[r.nombre]) matrix[r.nombre] = {};
    matrix[r.nombre][r.item] = (matrix[r.nombre][r.item]||0) + 1;
  });

  return { colaboradores, items, matrix };
}

function renderColabMatrix(data){
  const { colaboradores, items, matrix } = data;
  if(colaboradores.length===0 || items.length===0) return `<p style="font-size:13px; color:var(--text-soft); margin:0;">Sin datos.</p>`;
  const headerCells = items.map(it=>`<th style="text-align:center;">${it}</th>`).join('');
  const rowsHtml = colaboradores.map(nombre=>{
    const row = matrix[nombre] || {};
    let total = 0;
    const cells = items.map(it=>{
      const v = row[it] || 0;
      total += v;
      return `<td style="text-align:center; ${v?'font-weight:700;':'color:var(--line);'}">${v || '·'}</td>`;
    }).join('');
    return `<tr><td style="white-space:nowrap;" title="${nombre}">${shortName(nombre)}</td>${cells}<td style="text-align:center; font-weight:800; background:var(--bg);">${total}</td></tr>`;
  }).join('');
  return `
  <div style="overflow-x:auto;">
    <table class="dash-table">
      <thead><tr><th>Colaborador</th>${headerCells}<th style="text-align:center;">Total</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;
}


function renderHBars(data, colorFn){
  if(data.length===0) return `<p style="font-size:13px; color:var(--text-soft); margin:0;">Sin datos.</p>`;
  const max = Math.max(...data.map(d=>d[1]));
  return data.map((d,i)=>{
    const pct = Math.max((d[1]/max*100), 4);
    const color = colorFn ? colorFn(d[0]) : CHART_COLORS[i % CHART_COLORS.length];
    return `
    <div class="hbar-row">
      <div class="hbar-top"><span class="hbar-label">${d[0]}</span><span class="hbar-value">${d[1]}</span></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%; background:${color};"></div></div>
    </div>`;
  }).join('');
}

function renderVBars(data, labelFn){
  labelFn = labelFn || monthLabel;
  if(data.length===0) return `<p style="font-size:13px; color:var(--text-soft); margin:0;">Sin datos.</p>`;
  const max = Math.max(...data.map(d=>d[1]));
  return `<div class="vbar-chart">${data.map(([key,val])=>{
    const h = Math.max((val/max*100), 4);
    return `
    <div class="vbar-col">
      <div class="vbar-value">${val}</div>
      <div class="vbar-bar" style="height:${h}%;"></div>
      <div class="vbar-label">${labelFn(key)}</div>
    </div>`;
  }).join('')}</div>`;
}

function svgDonut(colored){
  const size = 140;
  const total = colored.reduce((s,d)=>s+d[1],0) || 1;
  const r = size/2 - 16, cx = size/2, cy = size/2, circ = 2*Math.PI*r;
  let offset = 0;
  const segs = colored.map(d=>{
    const len = (d[1]/total) * circ;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d[2]}" stroke-width="20" stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += len;
    return seg;
  }).join('');
  return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}">${segs}</svg>`;
}

function renderDonutWithLegend(data){
  if(data.length===0) return `<p style="font-size:13px; color:var(--text-soft); margin:0;">Sin datos.</p>`;
  const colored = data.map((d,i)=>[d[0], d[1], CHART_COLORS[i % CHART_COLORS.length]]);
  const total = colored.reduce((s,d)=>s+d[1],0) || 1;
  const legend = colored.map(d=>`
    <div class="legend-row">
      <div class="legend-dot" style="background:${d[2]};"></div>
      <div class="legend-label">${d[0]}</div>
      <div class="legend-value">${d[1]} · ${Math.round(d[1]/total*100)}%</div>
    </div>`).join('');
  return `<div class="donut-wrap">${svgDonut(colored)}<div class="donut-legend">${legend}</div></div>`;
}

    <div class="kpi-card"><div class="kpi-value">${rows.length}</div><div class="kpi-label">EPPs entregados</div></div>

    <div class="kpi-card"><div class="kpi-value" style="font-size:15px;">${ultima}</div><div class="kpi-label">Última entrega</div></div>

}

async function exportXlsx(){
  if(typeof XLSX === 'undefined'){ toast('No se pudo cargar el módulo de Excel'); return; }
  if(historialCache===null){ toast('Preparando archivo…'); historialCache = await fetchAllRecords(); }

  const regRows = [['ID','Fecha','Trabajador','DNI','Cargo','Sede','Tipo de entrega','Categoría','EPPs','Talla']];
  historialCache.forEach(r=>{
    getItemRows(r).forEach(x=>{
      regRows.push([r.id, r.fecha, r.worker.nombre, r.worker.dni, r.worker.cargo, r.worker.sede, tipoEntregaLabel(r.tipo_entrega), x.categoria, x.item, x.talla]);
    });
  });

  const colabRows = [['Nombre','DNI','Cargo','Sede','Nivel','Estado']];
  Object.entries(workersMap)
    .sort((a,b)=>a[1].nombre.localeCompare(b[1].nombre,'es'))
    .forEach(([dni,v])=>{ colabRows.push([v.nombre, dni, v.cargo, v.sede, v.nivel||'', v.estado==='activo'?'Activo':'Inactivo']); });

  const wb = XLSX.utils.book_new();
  const wsReg = XLSX.utils.aoa_to_sheet(regRows);
  wsReg['!cols'] = [{wch:14},{wch:12},{wch:26},{wch:11},{wch:16},{wch:14},{wch:15},{wch:20},{wch:30},{wch:10}];
  const wsColab = XLSX.utils.aoa_to_sheet(colabRows);
  wsColab['!cols'] = [{wch:26},{wch:11},{wch:16},{wch:14},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsReg, 'Registros');
  XLSX.utils.book_append_sheet(wb, wsColab, 'Colaboradores');
  XLSX.writeFile(wb, 'registro_epp.xlsx');
}

function colabListHtml(){
  const all = Object.entries(workersMap).map(([dni,v])=>({dni,...v}));
  const term = (state.colabSearch||'').toLowerCase();
  let filtered = all.filter(r=>{
    if(state.colabFilter==='activos' && r.estado!=='activo') return false;
    if(state.colabFilter==='inactivos' && r.estado!=='inactivo') return false;
    if(!term) return true;
    return r.nombre.toLowerCase().includes(term) || r.dni.includes(term) || (r.nivel||'').toLowerCase().includes(term) || (r.sede||'').toLowerCase().includes(term);
  });
  filtered.sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));

  if(filtered.length===0){
    return `<div class="empty-state">${ICONS.empty}<div>No hay colaboradores${term?' que coincidan':''}.</div></div>`;
  }
  return filtered.map(r=>`
    <div class="rec-card">
      <div class="rec-top">
        <div>
          <div class="rec-name">${r.nombre}</div>
          <div class="rec-meta">DNI ${r.dni} · ${r.cargo||'—'} · ${r.sede||'—'}${r.nivel?' · Nivel '+r.nivel:''}</div>
        </div>
        <span class="status-badge ${r.estado}">${r.estado==='activo'?'Activo':'Inactivo'}</span>
      </div>
      <div class="rec-actions">
        <button data-edit-colab="${r.dni}">${iconInline('pencil')} Editar</button>
        <button data-toggle-estado="${r.dni}">${iconInline('power')} ${r.estado==='activo'?'Desactivar':'Activar'}</button>
        <button class="danger" data-del-colab="${r.dni}">${iconInline('trash')} Eliminar</button>
      </div>
    </div>`).join('');
}

function bindColabResultHandlers(){
  document.querySelectorAll('[data-edit-colab]').forEach(el=>{
    el.onclick = ()=>{
      const dni = el.dataset.editColab;
      const w = workersMap[dni];
      state.colabForm = { mode:'edit', dni, nombre:w.nombre, cargo:w.cargo, sede:w.sede, nivel:w.nivel||'', estado:w.estado||'activo', origDni:dni };
      render();
    };
  });
  document.querySelectorAll('[data-toggle-estado]').forEach(el=>{
    el.onclick = async ()=>{
      const dni = el.dataset.toggleEstado;
      try{
        await toggleEstadoColaborador(dni);
      }catch(e){
        toast('No se pudo actualizar: ' + (e.message || 'error desconocido'));
      }
      document.getElementById('colabResults').innerHTML = colabListHtml();
      bindColabResultHandlers();
    };
  });
  document.querySelectorAll('[data-del-colab]').forEach(el=>{
    el.onclick = async ()=>{
      if(!confirm('¿Eliminar este colaborador? No se borrarán sus entregas ya registradas.')) return;
      const dni = el.dataset.delColab;
      await deleteColaborador(dni);
      toast('Colaborador eliminado');
      document.getElementById('colabResults').innerHTML = colabListHtml();
      bindColabResultHandlers();
    };
  });
}

      <div class="filter-pill ${state.colabFilter==='inactivos'?'sel':''}" data-colab-filter="inactivos">Inactivos (${counts.inactivos})</div>
    </div>
    <div id="colabResults">${colabListHtml()}</div>
  </div>`;
}

/* ============ GOOGLE SHEETS SYNC (Apps Script Web App) ============ */
function loadSheetUrl(){
  sheetUrl = loadSheetUrlFromBrowser();
}

function saveSheetUrl(url){
  sheetUrl = url;
  persistSheetUrlToBrowser(url);
}

async function sheetFetch(url, opts){
  const res = await fetch(url, opts);
  if(!res.ok){ throw new Error('HTTP ' + res.status); }
  return res.json();
}

async function testSheetConnection(url){
  try{
    const sep = url.includes('?') ? '&' : '?';
    const json = await sheetFetch(url + sep + 'type=registros');
    if(json.ok) return {ok:true, count:(json.rows||[]).length};
    return {ok:false, message:json.error || 'Respuesta inesperada'};
  }catch(e){
    return {ok:false, message:e.message};
  }
}

async function syncRegistroToSheet(record){
  if(!sheetUrl) return {ok:false, message:'No hay hoja de Google conectada'};
  const itemRows = buildItemRows(record);
  if(itemRows.length === 0) return {ok:false, message:'No hay EPP seleccionados para guardar'};
  const rows = itemRows.map(x => ({
    'ID': record.id,
    'Fecha': record.fecha,
    'Trabajador': record.worker.nombre,
    'DNI': record.worker.dni,
    'Cargo': record.worker.cargo,
    'Sede': record.worker.sede,
    'Tipo de entrega': tipoEntregaLabel(record.tipo_entrega),
    'Categoría': x.categoria,
    'EPPs': x.item,
    'Talla': x.talla
  }));
  try{
    const json = await sheetFetch(sheetUrl, { method:'POST', body: JSON.stringify({type:'registro', action:'append', rows}) });
    return json.ok ? {ok:true} : {ok:false, message:json.error || 'Respuesta inesperada'};
  }catch(e){
    return {ok:false, message:e.message};
  }
}

async function deleteRegistroFromSheet(id){
  if(!sheetUrl) return;
  try{ await sheetFetch(sheetUrl, {method:'POST', body: JSON.stringify({type:'registro', action:'delete', id})}); }
  catch(e){ console.error('sheet delete registro error', e); }
}

async function syncColaboradorToSheet(w){
  if(!sheetUrl) return {ok:false, message:'No hay hoja de Google conectada'};
  const data = { 'DNI': w.dni, 'Nombre': w.nombre, 'Cargo': w.cargo, 'Sede': w.sede, 'Nivel': w.nivel||'', 'Estado': w.estado==='activo'?'Activo':'Inactivo' };
  try{
    const json = await sheetFetch(sheetUrl, { method:'POST', body: JSON.stringify({type:'colaborador', action:'upsert', data}) });
    return json.ok ? {ok:true} : {ok:false, message:json.error || 'Respuesta inesperada'};
  }catch(e){
    return {ok:false, message:e.message};
  }
}

async function deleteColaboradorFromSheet(dni){
  if(!sheetUrl) return;
  try{ await sheetFetch(sheetUrl, {method:'POST', body: JSON.stringify({type:'colaborador', action:'delete', dni})}); }
  catch(e){ console.error('sheet delete colaborador error', e); }
}

/* ============ SIGNATURE PAD ============ */
let sigCtx=null, sigDrawing=false, sigHasContent=false, sigMouseUpHandler=null;
function initSignaturePad(){
  const canvas = document.getElementById('sigCanvas');
  if(!canvas) return;
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  sigCtx = canvas.getContext('2d');
  sigCtx.scale(ratio, ratio);
  sigCtx.lineWidth = 2.4;
  sigCtx.lineCap = 'round';
  sigCtx.strokeStyle = '#1B2027';
  sigHasContent = !!state.signatureData;
  document.getElementById('sigPlaceholder').style.display = sigHasContent ? 'none' : 'flex';
  if(state.signatureData){
    const img = new Image();
    img.onload = ()=> sigCtx.drawImage(img, 0, 0, rect.width, rect.height);
    img.src = state.signatureData;
  }
  let last = null;
  function pos(e){
    const r = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return {x:cx, y:cy};
  }
  function start(e){ e.preventDefault(); sigDrawing=true; last=pos(e); document.getElementById('sigPlaceholder').style.display='none'; }
  function move(e){
    if(!sigDrawing) return; e.preventDefault();
    const p = pos(e);
    sigCtx.beginPath(); sigCtx.moveTo(last.x,last.y); sigCtx.lineTo(p.x,p.y); sigCtx.stroke();
    last = p; sigHasContent = true;
  }
  function end(){
    if(!sigDrawing) return;
    sigDrawing=false;
    if(sigHasContent){ state.signatureData = canvas.toDataURL('image/png'); }
    updateNextButtonState();
  }
  canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
  if(sigMouseUpHandler){ window.removeEventListener('mouseup', sigMouseUpHandler); }
  sigMouseUpHandler = end;
  window.addEventListener('mouseup', sigMouseUpHandler);
  canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);

  document.getElementById('sigClear').onclick = ()=>{
    sigCtx.clearRect(0,0,canvas.width,canvas.height);
    state.signatureData = null; sigHasContent = false;
    document.getElementById('sigPlaceholder').style.display='flex';
    updateNextButtonState();
  };
}
function updateNextButtonState(){
  const btn = document.getElementById('btnNext');
  if(btn) btn.disabled = !canAdvance();
}

/* ============ HANDLERS ============ */
function attachHandlers(){
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.onclick = ()=>{
      const target = el.dataset.tab;
      if(state.view==='colaboradores' && target!=='colaboradores'){ state.colabForm = null; }
      state.view = target;
      render();
    };
  });

  if(state.view==='home'){
    const editLink = document.getElementById('btnEditSheetLink');
    if(editLink) editLink.onclick = ()=>{ state.showSheetConnect = true; state.sheetConnectStatus='idle'; state.sheetConnectMessage=''; render(); };
    const cancelBtn = document.getElementById('btnCancelSheetConnect');
    if(cancelBtn) cancelBtn.onclick = ()=>{ state.showSheetConnect = false; render(); };
    const clearBtn = document.getElementById('btnClearSheetUrl');
    if(clearBtn) clearBtn.onclick = ()=>{
      const input = document.getElementById('in_sheet_url');
      input.value = '';
      input.focus();
    };
    const connectBtn = document.getElementById('btnConnectSheet');
    if(connectBtn) connectBtn.onclick = async ()=>{
      const input = document.getElementById('in_sheet_url');
      const url = (input.value||'').trim();
      if(!url || !url.includes('script.google.com')){
        state.sheetConnectStatus = 'error';
        state.sheetConnectMessage = 'Pega una URL válida de Apps Script (termina en /exec)';
        document.getElementById('sheetConnectStatusWrap').innerHTML = sheetConnectStatusHtml();
        return;
      }
      state.sheetConnectStatus = 'testing';
      state.sheetConnectMessage = '';
      document.getElementById('sheetConnectStatusWrap').innerHTML = sheetConnectStatusHtml();
      connectBtn.disabled = true;
      const res = await testSheetConnection(url);
      if(res.ok){
        saveSheetUrl(url);
        await loadWorkersMap();
        historialCache = null;
        state.showSheetConnect = false;
        state.sheetConnectStatus = 'idle';
        toast('Conectado · ' + res.count + ' registro(s) encontrados');
        render();
      } else {
        state.sheetConnectStatus = 'error';
        state.sheetConnectMessage = res.message || 'No se pudo conectar';
        document.getElementById('sheetConnectStatusWrap').innerHTML = sheetConnectStatusHtml();
        connectBtn.disabled = false;
      }
    };
    return;
  }

  if(state.view==='form'){
    if(state.step===5){
      const a=document.getElementById('btnAnotherDelivery'); if(a) a.onclick=()=>{
        state.items={}; state.otros=''; state.tipo_entrega=''; state.fecha=new Date().toISOString().slice(0,10);
        state.signatureData=null; state.step=2; state.openCat=null; state.syncStatus='idle'; state.syncMessage=''; render();
      };
      const b=document.getElementById('btnNewWorker'); if(b) b.onclick=()=>{ resetAll(); render(); };
      const c=document.getElementById('btnGoHistorial'); if(c) c.onclick=()=>{ resetAll(); state.view='historial'; render(); };
      return;
    }

    const back = document.getElementById('btnBack');
    if(back) back.onclick = ()=>{ state.step -= 1; render(); };
    const next = document.getElementById('btnNext');
    if(next) next.onclick = async ()=>{
      if(!canAdvance()) return;
      if(state.step < 4){ state.step += 1; render(); }
      else { await submitRecord(); }
    };

    if(state.step===1){
      const comboToggle = document.querySelector('[data-combo-toggle]');
      if(comboToggle) comboToggle.onclick = ()=>{ state.step1DropdownOpen = !state.step1DropdownOpen; render(); };
      document.querySelectorAll('[data-combo-option]').forEach(el=>{
        el.onclick = ()=>{
          const dniVal = el.dataset.comboOption;
          const wdata = workersMap[dniVal];
          if(wdata){ state.worker = { dni: dniVal, nombre: wdata.nombre, cargo: wdata.cargo, sede: wdata.sede }; }
          state.step1DropdownOpen = false;
          render();
        };
      });
    }

    if(state.step===2){
      document.querySelectorAll('[data-toggle-cat]').forEach(el=>{
        el.onclick = ()=>{ state.openCat = (state.openCat===el.dataset.toggleCat)?null:el.dataset.toggleCat; render(); };
      });
      document.querySelectorAll('[data-check]').forEach(el=>{
        el.onclick = ()=> toggleItem(el.dataset.check);
      });
      document.querySelectorAll('[data-check-label]').forEach(el=>{
        el.onclick = ()=> toggleItem(el.dataset.checkLabel);
      });
      document.querySelectorAll('[data-talla-btn]').forEach(el=>{
        el.onclick = (e)=>{ e.stopPropagation(); setTalla(el.dataset.tallaBtn, el.dataset.tallaVal); };
      });
      document.querySelectorAll('[data-talla-input]').forEach(el=>{
        el.oninput = (e)=>{ setTallaSilent(el.dataset.tallaInput, e.target.value); updateNextButtonState(); };
        el.onclick = (e)=> e.stopPropagation();
      });
      const otros = document.getElementById('in_otros');
      if(otros) otros.oninput = (e)=>{ state.otros = e.target.value; updateNextButtonState(); };
    }

    if(state.step===3){
      document.querySelectorAll('[data-tipo]').forEach(el=>{
        el.onclick = ()=>{
          state.tipo_entrega = el.dataset.tipo;
          document.querySelectorAll('[data-tipo]').forEach(p=> p.classList.toggle('sel', p.dataset.tipo===state.tipo_entrega));
          updateNextButtonState();
        };
      });
      const fecha = document.getElementById('in_fecha');
      if(fecha) fecha.oninput = (e)=>{ state.fecha = e.target.value; updateNextButtonState(); };
      initSignaturePad();
      updateNextButtonState();
    }
  } else if(state.view==='historial') {
    const search = document.getElementById('in_search');
    if(search) search.oninput = (e)=>{
      searchTerm = e.target.value;
      document.getElementById('histResults').innerHTML = historialListHtml();
      bindHistResultHandlers();
    };
    const exportBtn = document.getElementById('btnExport');
    if(exportBtn) exportBtn.onclick = exportXlsx;
    const refreshBtn = document.getElementById('btnRefreshHist');
    if(refreshBtn) refreshBtn.onclick = refreshHistorial;
    bindHistResultHandlers();
  } else if(state.view==='dashboard') {
    const bindSel = (id, key)=>{
      const el = document.getElementById(id);
      if(el) el.onchange = (e)=>{ state.dashFilters[key] = e.target.value; render(); };
    };
    bindSel('dash_sede','sede');
    bindSel('dash_categoria','categoria');
    bindSel('dash_desde','desde');
    bindSel('dash_hasta','hasta');
    const clearBtn = document.getElementById('btnClearDashFilters');
    if(clearBtn) clearBtn.onclick = ()=>{ state.dashFilters = {sede:'',categoria:'',desde:'',hasta:''}; render(); };
    const refreshBtn = document.getElementById('btnRefreshDash');
    if(refreshBtn) refreshBtn.onclick = refreshHistorial;
    document.querySelectorAll('[data-colabview]').forEach(el=>{
      el.onclick = ()=>{ state.dashColabView = el.dataset.colabview; render(); };
    });
  } else if(state.view==='colaboradores') {
    if(state.colabForm){
      ['cf_dni','cf_nombre','cf_cargo','cf_sede','cf_nivel'].forEach((id,i)=>{
        const key = ['dni','nombre','cargo','sede','nivel'][i];
        const el = document.getElementById(id);
        if(el) el.oninput = (e)=>{ state.colabForm[key] = key==='dni' ? e.target.value.replace(/\D/g,'').slice(0,8) : e.target.value; };
      });
      document.querySelectorAll('[data-colab-estado]').forEach(el=>{
        el.onclick = ()=>{ state.colabForm.estado = el.dataset.colabEstado; render(); };
      });
      const cancel = document.getElementById('btnCancelColab');
      if(cancel) cancel.onclick = ()=>{ state.colabForm = null; render(); };
      const save = document.getElementById('btnSaveColab');
      if(save) save.onclick = async ()=>{
        const f = state.colabForm;
        if(!f.dni || f.dni.length<8 || !f.nombre.trim() || !f.cargo.trim() || !f.sede.trim()){
          toast('Completa DNI, nombre, cargo y sede'); return;
        }
        if(f.mode==='new' && workersMap[f.dni]){ toast('Ya existe un colaborador con ese DNI'); return; }
        save.disabled = true;
        save.textContent = 'Guardando en la Hoja de Google…';
        try{
          await saveColaborador(f, f.origDni);
          state.colabForm = null;
          toast('Colaborador guardado en tu Hoja de Google');
          render();
        }catch(e){
          toast('No se pudo guardar: ' + (e.message || 'error desconocido'));
          save.disabled = false;
          save.textContent = 'Guardar colaborador';
        }
      };
    } else {
      const search = document.getElementById('in_colab_search');
      if(search) search.oninput = (e)=>{
        state.colabSearch = e.target.value;
        document.getElementById('colabResults').innerHTML = colabListHtml();
        bindColabResultHandlers();
      };
      const exportColabBtn = document.getElementById('btnExportColab');
      if(exportColabBtn) exportColabBtn.onclick = exportXlsx;
      const refreshColabBtn = document.getElementById('btnRefreshColab');
      if(refreshColabBtn) refreshColabBtn.onclick = async ()=>{
        refreshColabBtn.disabled = true;
        await loadWorkersMap();
        render();
      };
      document.querySelectorAll('[data-colab-filter]').forEach(el=>{
        el.onclick = ()=>{ state.colabFilter = el.dataset.colabFilter; render(); };
      });
      const newBtn = document.getElementById('btnNewColab');
      if(newBtn) newBtn.onclick = ()=>{
        state.colabForm = { mode:'new', dni:'', nombre:'', cargo:'', sede:'', nivel:'', estado:'activo', origDni:null };
        render();
      };
      bindColabResultHandlers();
    }
  }
}

function toggleItem(id){
  const cur = state.items[id] || {checked:false, talla:''};
  cur.checked = !cur.checked;
  state.items[id] = cur;
  render();
}
function setTalla(id, val){
  const cur = state.items[id] || {checked:true, talla:''};
  cur.talla = val;
  state.items[id] = cur;
  render();
}
function setTallaSilent(id, val){
  const cur = state.items[id] || {checked:true, talla:''};
  cur.talla = val;
  state.items[id] = cur;
}

function showRecordDetail(id){
  const r = historialCache.find(x=>x.id===id);
  if(!r) return;
  const items = flattenRecordItems(r).join('\n• ');
  alert(`${r.worker.nombre} (DNI ${r.worker.dni})\n${r.worker.cargo} · ${r.worker.sede}\nFecha: ${fmtDate(r.fecha)}\nTipo: ${tipoEntregaLabel(r.tipo_entrega)}\n\nEPP entregados:\n• ${items || '—'}`);
}

async function submitRecord(){
  const next = document.getElementById('btnNext');
  if(next){ next.disabled = true; next.textContent = 'Guardando en la Hoja de Google…'; }
  const record = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    worker: {...state.worker},
    items: JSON.parse(JSON.stringify(state.items)),
    otros: state.otros,
    tipo_entrega: state.tipo_entrega,
    fecha: state.fecha,
    signatureData: state.signatureData,
    createdAt: new Date().toISOString()
  };
  try{
    await saveRecord(record);
    state.step = 5;
    state.syncStatus = 'ok';
    state.syncMessage = '';
    toast('Registro guardado en tu Hoja de Google');
    render();
  }catch(e){
    console.error(e);
    toast('No se pudo guardar: ' + (e.message || 'error desconocido'));
    if(next){ next.disabled=false; next.textContent='Guardar registro'; }
  }
}

function resetAll(){
  state = {
    view:'form', step:1,
    worker:{nombre:'',dni:'',cargo:'',sede:''},
    items:{}, otros:'', tipo_entrega:'', fecha:new Date().toISOString().slice(0,10),
    signatureData:null, openCat:null, step1Search:'', step1DropdownOpen:false,
    colabFilter: state.colabFilter, colabSearch: state.colabSearch, colabForm: null,
    syncStatus:'idle', syncMessage:'',
    dashFilters: state.dashFilters || {sede:'',categoria:'',desde:'',hasta:''},
    dashColabView: state.dashColabView || 'categoria'
  };
}

/* ============ INIT ============ */
(async function init(){
  loadSheetUrl();
  render();
  if(sheetUrl){
    await loadWorkersMap();
    render();
  }
})();
</script>
